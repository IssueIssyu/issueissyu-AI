# main 브랜치로 PR이 머지되었을 때 dev EB 배포 + 수동 실행(workflow_dispatch).

name: Issueissyu Dev CI/CD

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: issueissyu-ai-dev-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main')
    uses: ./.github/workflows/_reusable-eb-deploy.yml
    with:
      application_name: issueissyu-ai-dev
      environment_name: issueissyu-ai-dev-env
      health_url: ${{ vars.DEV_HEALTH_URL }}
      checkout_ref: main
    secrets:
      DEPLOY_ENV: ${{ secrets.DEV_ENV }}

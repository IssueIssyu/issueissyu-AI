# PR / push 시 FastAPI 통합 CI
# 서비스 컨테이너(Postgres/pgvector / Redis) → infra smoke → unittest → uvicorn /health 200 확인

name: IssueIssyu AI CI

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env from secret (CI_ENV)
        run: |
          if [ -z "${{ secrets.CI_ENV }}" ]; then
            echo "Repository secret CI_ENV 가 비어 있습니다."
            exit 1
          fi
          printf '%s' "${{ secrets.CI_ENV }}" > .env
          chmod 600 .env

      - name: Override datasource and Redis for CI services
        run: |
          cat >> .env << 'EOF'
          APP_ENV=local
          LOCAL_DB_HOST=127.0.0.1
          LOCAL_DB_PORT=5432
          LOCAL_DB_NAME=app
          LOCAL_DB_USER=postgres
          LOCAL_DB_PASSWORD=postgres
          REDIS_LOCAL_HOST=127.0.0.1
          REDIS_LOCAL_PORT=6379
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system libraries (pycairo / WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2-dev \
            libpango1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libffi-dev \
            pkg-config

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check (compileall)
        run: python -m compileall -q app

      - name: Infra smoke (PostgreSQL/Redis/S3)
        run: python scripts/ci_infra_smoke.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

      - name: Start app and verify /health
        env:
          APP_ENV: local
          LOCAL_DB_HOST: 127.0.0.1
          LOCAL_DB_PORT: 5432
          LOCAL_DB_NAME: app
          LOCAL_DB_USER: postgres
          LOCAL_DB_PASSWORD: postgres
          REDIS_LOCAL_HOST: 127.0.0.1
          REDIS_LOCAL_PORT: "6379"
        run: |
          set -euo pipefail
          LOG=/tmp/ai-boot.log
          : >"$LOG"
          uvicorn app.main:app --host 127.0.0.1 --port 8000 >>"$LOG" 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true; wait "$PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "Uvicorn process exited early (iteration $i)"
              break
            fi
            code="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/health || true)"
            if [ "$code" = "200" ]; then
              echo "health OK"
              exit 0
            fi
            sleep 2
          done
          echo "health check failed (last HTTP code=${code:-n/a})"
          echo "---- last 250 lines of boot log ----"
          tail -n 250 "$LOG" || true
          exit 1

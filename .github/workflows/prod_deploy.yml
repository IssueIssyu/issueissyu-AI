# prod 브랜치로 PR이 머지되었을 때 prod EB 배포 + 수동 실행(workflow_dispatch).

name: Issueissyu Prod CI/CD

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: issueissyu-ai-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'prod')
    uses: ./.github/workflows/_reusable-eb-deploy.yml
    with:
      application_name: issueissyu-ai-prod
      environment_name: issueissyu-ai-env
      health_url: ${{ vars.PROD_HEALTH_URL }}
      checkout_ref: prod
    secrets:
      DEPLOY_ENV: ${{ secrets.PROD_ENV }}
